name: Frontend CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-frontend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: hango-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'

      - run: flutter pub get

      - run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - run: flutter test